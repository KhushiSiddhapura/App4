<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bill-container">
        <div class="bill">
            <div class="customer">
                <p><label for="name">Name</label><span>: Customer's Name</span></p>
                <p><label for="no">Contact No.</label><span>: +91 9876543210</span></p>
                <p><label for="add">Address</label><span>: Customer's Address</span></p>
                <p><label for="date">Date</label><span>: 08 March, 2026</span></p>
            </div>
            <div class="pricing">
                <header>
                    <p>Food item</p>
                    <p>Price</p>
                    <p>Quantity</p>
                </header>
                <main>
                    <p id="name"></p>
                    <p id="price"></p>
                    <p>1</p>
                </main>
                <footer>
                    <p>Total Price: </p>
                    <p id="total_price"></p>
                </footer>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bill-container">
        <div class="bill">
            <div class="customer">
                <p><label for="name">Name</label><span>: Khushi Siddhapura</span></p>
                <p><label for="no">Contact No.</label><span>: +91 8200886093</span></p>
                <p><label for="add">Address</label><span>: T/1, Aradhana Devam, Anand - 388120</span></p>
                <p><label for="date">Date</label><span>: 08 March, 2026</span></p>
            </div>
            <div class="pricing">
                <table>
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Price</th>
                            <th>Quantity</th>
                        </tr>
                    </thead>
                    <tbody id="billing">

                    </tbody>
                    <tr>
                        <td colspan="2" class="right">Final Price:</td>
                        <td id="total_pr">0</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
